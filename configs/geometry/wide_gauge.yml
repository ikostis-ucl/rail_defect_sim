# tsv-twin track geometry — broad gauge (1520 mm Russian/Soviet standard)
# All dimensions in metres.

rail_spacing: 1.520

left_rail:
  head_width: 0.070       # rail crown width — visual width of the running surface
  foot_width: 0.150       # base flange width — drives fastener seat positions
  height: 0.160           # total rail height from foot bottom to head top
  pad_thickness: 0.007    # elastomeric pad between rail foot and sleeper surface
  lift: 0.0
  angle: 0.0

right_rail:
  head_width: 0.070
  foot_width: 0.150
  height: 0.160
  pad_thickness: 0.007
  lift: 0.0
  angle: 0.0

sleeper_depth: 0.115      # along-track sleeper depth (NOT the cross-track length)
sleeper_height: 0.130
sleeper_pitch_ratio: 0.62

screw_radius: 0.016
screw_length: 0.055
