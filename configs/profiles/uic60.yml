# UIC60 (60E1) rail profile — European high-speed and heavy-haul mainlines
# Source: UIC leaflet 860, Table 1.
#
# These values are the *reference* used by validate_against_profile("UIC60").
# All linear dimensions in millimetres.  sleeper_pitch_ratio is dimensionless.

name: UIC60
standard: 60E1

head_width_mm: 74.0
foot_width_mm: 150.0
height_mm: 172.0

# Sleeper — B70 / B75 concrete monoblock (standard gauge, 1 435 mm)
#   Along-track depth = 260 mm.
#   section_pitch = 0.260 / 0.400 = 0.650 m
sleeper_depth_mm: 260.0
sleeper_height_mm: 220.0
sleeper_pitch_ratio: 0.400     # 260 mm / 650 mm = 0.400

# Fasteners — Vossloh SKL-14 / Pandrol e-clip style
clip_diameter_mm: 13.0
clip_height_mm: 30.0
pad_thickness_mm: 7.0
