# 115RE rail profile — AREMA North American Class I freight mainlines
# Source: AREMA Manual for Railway Engineering, Chapter 4.
#
# These values are the *reference* used by validate_against_profile("115RE").
# All linear dimensions in millimetres.  sleeper_pitch_ratio is dimensionless.

name: 115RE
standard: AREMA 115RE

head_width_mm: 69.9
foot_width_mm: 152.4
height_mm: 184.2

# Sleeper — concrete crosstie at 1 435 mm gauge
#   Along-track depth = 260 mm.
#   Typical pitch ≈ 600 mm (US Class I concrete tie standard).
#   section_pitch = 0.260 / 0.433 ≈ 0.600 m
sleeper_depth_mm: 260.0
sleeper_height_mm: 210.0
sleeper_pitch_ratio: 0.433     # 260 mm / 600 mm ≈ 0.433

# Fasteners — Pandrol e-clip / Safelok style
clip_diameter_mm: 14.0
clip_height_mm: 35.0
pad_thickness_mm: 8.0
